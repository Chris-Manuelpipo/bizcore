# =============================================================================
# BizCore Backend - Development Profile Configuration
# H2 In-Memory Database for quick testing
# =============================================================================

spring:
  # ---------------------------------------------------------------------------
  # Database Configuration
  # Using H2 for development (in-memory)
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:mem:bizcore_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  # ---------------------------------------------------------------------------
  # H2 Console (accessible at /h2-console)
  # ---------------------------------------------------------------------------
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  # ---------------------------------------------------------------------------
  # JPA/Hibernate Configuration
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        use_sql_comments: true
        generate_statistics: false
    open-in-view: false
  
  # ---------------------------------------------------------------------------
  # Liquibase Configuration
  # Disabled for dev with H2 - use manual schema or SQL scripts
  # ---------------------------------------------------------------------------
  liquibase:
    enabled: false
  
  # ---------------------------------------------------------------------------
  # Development Tools
  # ---------------------------------------------------------------------------
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: DEBUG
    com.bizcore: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.transaction: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: true

# =============================================================================
# Actuator Configuration
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: false

# =============================================================================
# SpringDoc OpenAPI Configuration
# =============================================================================
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs
